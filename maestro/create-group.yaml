appId: ai.ubek.friend
---
# Assumes signed-in state.
- launchApp
- tapOn:
    text: "People"

- assertVisible: "Groups"
# Section header "New" action — visible whenever any group already exists.
# (The dashed "New group" card itself sits at the end of a horizontal scroll
# and goes off-screen once groups exist, so we use the header button.)
- tapOn:
    text: "New"
- assertVisible: "GROUP NAME"

- tapOn:
    text: "e.g. Book club, Family"
- inputText: "Maestro test group"

# Pick at least one member
- tapOn:
    index: 0
    text: ".+"
    enabled: true

- tapOn: "Create"

# Group should now appear in the strip
- assertVisible: "Maestro test group"
