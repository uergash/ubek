appId: ai.ubek.friend
---
# Edit a person's relation via the profile Edit sheet. Verifies the update
# persists by re-opening the profile and seeing the new value in the header
# subtitle.
- launchApp
- assertVisible: "Home"

# Navigate to Adam's profile.
- tapOn: "People"
- tapOn: "Search all people"
- tapOn: "Search by name"
- inputText: "Adam"
- tapOn: "Adam Saeman"

- tapOn:
    id: "profile_edit"
- assertVisible: "Edit profile"

# Switch relation to Family via the preset chip.
- tapOn: "Family"

- tapOn: "Save"

# Header should reflect the new relation.
- extendedWaitUntil:
    visible: "Family"
    timeout: 5000

# Revert so the test is repeatable.
- tapOn:
    id: "profile_edit"
- tapOn: "Friend"
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Friend"
    timeout: 5000
