appId: ai.ubek.friend
---
# Assumes signed-in state AND that create-group.yaml has run at some point so
# "Maestro test group" exists. If not, run create-group first.
- launchApp
- assertVisible: "Home"

- tapOn: "People"
- assertVisible: "Groups"

- tapOn: "Maestro test group"

# AllPeopleView opens with the group filter pre-selected. "All people" is the
# inline navigation title; sheet present + nav title render takes a beat.
- extendedWaitUntil:
    visible: "All people"
    timeout: 3000
- assertVisible: "Maestro test group"
