appId: ai.ubek.friend
---
# Smoke test of bottom-tab navigation + Settings entry point. The bottom bar
# only has Home + People — Settings is a sheet opened from Home's gear icon.
- launchApp
- assertVisible: "Home"
- assertVisible: "Upcoming"

- tapOn: "People"
- assertVisible: "Top contacts"
- assertVisible: "Groups"

# Back to Home, then open Settings via the gear (id: home_settings).
- tapOn: "Home"
- tapOn:
    id: "home_settings"
- assertVisible: "Reach-out cadence"
- assertVisible: "Sign out"

# Dismiss Settings sheet and confirm we land back on Home.
- tapOn: "Done"
- assertVisible: "Upcoming"
