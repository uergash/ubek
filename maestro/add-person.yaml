appId: ai.ubek.friend
---
# Manually create a new person via the People page "+" button. Verifies the
# form saves and lands on the new profile.
- launchApp
- assertVisible: "Home"

- tapOn: "People"
- tapOn:
    id: "people_add"
- assertVisible: "New person"

- tapOn: "Name"
- inputText: "Maestro Tester"

# Default relation is "Friend" so we can leave it. Also leave avatar/freq
# at defaults — happy path.

# NewPersonSheet's Add button transitions to "Saving…" mid-tap; constrain
# the match so we don't grab a stray "Add" elsewhere.
- tapOn:
    text: "Add"
    enabled: true

# Lands on the new person's profile (NewPersonSheet's onCreate navigates).
- extendedWaitUntil:
    visible: "Maestro Tester"
    timeout: 10000
- assertVisible: "Overview"
- assertVisible: "Add note"
