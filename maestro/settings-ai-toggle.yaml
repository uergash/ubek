appId: ai.ubek.friend
---
# Toggles AI features off, opens a fresh profile (no cached summary), asserts
# the summary card shows the "AI features off" hint, then turns it back on.
#
# We create a scratch profile here rather than reusing a seeded person:
# ProfileViewModel only swaps in the off-message when no summary has been
# generated yet, so any previously-visited person may have one cached and
# the off-state is invisible.
- launchApp
- assertVisible: "Home"

# Create the scratch profile (no notes → no cached summary).
- tapOn: "People"
- tapOn:
    id: "people_add"
- assertVisible: "New person"
- tapOn: "Name"
- inputText: "AI Toggle Tester"
- tapOn:
    text: "Add"
    enabled: true
- extendedWaitUntil:
    visible: "AI Toggle Tester"
    timeout: 10000

# Back to Home, open Settings, flip AI features off.
- tapOn: "Home"
- tapOn:
    id: "home_settings"
- assertVisible: "AI features"
- tapOn:
    id: "settings_ai_toggle"
- tapOn: "Done"

# Open the scratch profile and verify the AI-off summary copy.
- tapOn: "People"
- tapOn: "Search all people"
- tapOn: "Search by name"
- inputText: "AI Toggle Tester"
- tapOn: "AI Toggle Tester"
- assertVisible: "Overview"
- extendedWaitUntil:
    visible: "AI features are off"
    timeout: 10000

# Restore: Home → Settings → flip on → dismiss.
- tapOn: "Home"
- tapOn:
    id: "home_settings"
- tapOn:
    id: "settings_ai_toggle"
- tapOn: "Done"
