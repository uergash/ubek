name: Friend
options:
  bundleIdPrefix: ai.ubek
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.4"
  compatibilityVersion: "Xcode 14.0"

configs:
  Debug: debug
  Release: release

schemes:
  Friend:
    build:
      targets:
        Friend: all
        FriendTests: [test]
    test:
      targets:
        - FriendTests
      gatherCoverageData: true

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    exactVersion: 1.15.4

targets:
  Friend:
    type: application
    platform: iOS
    sources:
      - path: Friend
        excludes:
          - "Widget/FriendWidget.swift"
          - "Widget/Info.plist"
          - "Widget/FriendWidget.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.ubek.friend
        PRODUCT_NAME: Friend
        INFOPLIST_FILE: Friend/Info.plist
        CODE_SIGN_ENTITLEMENTS: Friend/Friend.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: Supabase
        product: Supabase
      - target: FriendWidget

  FriendTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FriendTests
    dependencies:
      - target: Friend
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.ubek.friend.tests
        PRODUCT_NAME: FriendTests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  FriendWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Friend/Widget
        excludes:
          - "Info.plist"
          - "FriendWidget.entitlements"
      - path: Friend/Design
      - path: Friend/Models
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.ubek.friend.widget
        PRODUCT_NAME: FriendWidget
        INFOPLIST_FILE: Friend/Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Friend/Widget/FriendWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
